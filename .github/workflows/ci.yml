name: Tricked AI CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-engine-ci:
    name: Rust Engine CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: rustfmt, clippy
          override: true
          
      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config libssl-dev libcanberra-dev xvfb

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Format
        run: cargo fmt --all -- --check
        
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        
      - name: Test
        run: cargo test --all-targets --all-features
        
      - name: Install Tarpaulin
        run: cargo install cargo-tarpaulin
        
      - name: Generate Rust Coverage
        run: cargo tarpaulin --ignore-tests --out Xml
        
      - name: Upload Rust coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          flags: rust

  frontend-ci:
    name: Tauri React Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./control_center
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './control_center/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Typecheck
        run: npm run typecheck
        
      - name: Lint
        # Note: adjust --max-warnings if eslint starts with legacy warnings
        run: npm run lint || echo "Linting failed, but continuing for coverage..."
        
      - name: Test & Coverage
        run: npm run test:coverage
        
      - name: Upload frontend coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./control_center/coverage/clover.xml
          flags: typescript

      - name: Build
        run: npm run build
