version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: tricked_user
      POSTGRES_PASSWORD: tricked_password
      POSTGRES_DB: tricked_workspace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 2g

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    entrypoint: ["uvicorn", "tricked.server:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - DB_URL=postgresql://tricked_user:tricked_password@postgres:5432/tricked_workspace
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 8g 

  db_writer:
    build: 
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "-m", "tricked.db_writer"]
    environment:
      - DB_URL=postgresql://tricked_user:tricked_password@postgres:5432/tricked_workspace
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
