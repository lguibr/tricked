version: '3.9'

services:
  tricked-ai:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    volumes:
      - ./runs:/app/runs
      - ./metrics.json:/app/metrics.json
      - ./GUMBEL_MUZERO_DOSSIER.md:/app/GUMBEL_MUZERO_DOSSIER.md
    ports:
      - "5173:5173"   # Svelte UI
      - "8080:8080"   # Flask API
      - "6006:6006"   # TensorBoard
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - ENABLE_WEB_UI=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
