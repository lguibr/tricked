version: '3.9'

services:
  tricked-backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./runs:/app/runs
      - ./metrics.json:/app/metrics.json
      - ./GUMBEL_MUZERO_DOSSIER.md:/app/GUMBEL_MUZERO_DOSSIER.md
    ports:
      - "8080:8080" # FastAPI
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - REDIS_HOST=redis
      - WANDB_BASE_URL=http://wandb-local:8080
      - WANDB_API_KEY=local-2a3b4c5d6e7f8g9h0i1j2k3l4m5n6o7p8q9r0s1t
      - LIBTORCH_USE_PYTORCH=1
      - LIBTORCH_BYPASS_VERSION_CHECK=1
    depends_on:
      - redis
      - wandb-local

  tricked-ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    environment:
      - BACKEND_HOST=tricked-backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - tricked-backend

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  wandb-local:
    image: wandb/local
    ports:
      - "8081:8080"
    volumes:
      - wandb_data:/vol

volumes:
  wandb_data:
